<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Publisher · blinkthirty</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; min-height: 100vh; padding: 24px 16px; color: #0a0a0a; }
  .card { background: white; border-radius: 12px; padding: 24px; max-width: 480px; margin: 0 auto; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #8a8070; margin-bottom: 20px; }
  .divider { border: none; border-top: 1px solid #f0ede8; margin: 20px 0; }
  .toggle-btn { font-size: 13px; color: #e8390e; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 14px; display: block; font-family: inherit; }
  .config-box { background: #fafaf8; border: 1px solid #e8e4dc; border-radius: 10px; padding: 16px; margin-bottom: 4px; }
  .config-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: #8a8070; margin-bottom: 14px; }
  label { font-size: 12px; font-weight: 500; color: #555; display: block; margin-bottom: 5px; }
  input, select { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ddd; border-radius: 8px; background: white; color: #0a0a0a; font-family: inherit; margin-bottom: 12px; }
  input:focus, select:focus { outline: none; border-color: #e8390e; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .row input { margin-bottom: 0; }
  .section-label { font-size: 13px; font-weight: 600; margin-bottom: 10px; display: block; }
  .day-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-bottom: 20px; }
  .day-btn { padding: 9px 4px; font-size: 13px; font-weight: 500; background: #f5f0e8; border: 1px solid #e0dbd0; border-radius: 6px; cursor: pointer; font-family: inherit; color: #0a0a0a; transition: all 0.1s; }
  .day-btn:hover { background: #e8390e; color: white; border-color: #e8390e; }
  .day-btn.active { background: #e8390e; color: white; border-color: #e8390e; }
  .tag-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .tag-row select, .tag-row input { margin-bottom: 0; }
  textarea { width: 100%; padding: 12px; font-size: 14px; border: 1.5px solid #ddd; border-radius: 8px; background: white; color: #0a0a0a; font-family: inherit; min-height: 180px; resize: vertical; margin-bottom: 16px; line-height: 1.6; }
  textarea:focus { outline: none; border-color: #e8390e; }
  .publish-btn { width: 100%; padding: 14px; background: #0a0a0a; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s, transform 0.1s; }
  .publish-btn:hover { background: #e8390e; }
  .publish-btn:active { transform: scale(0.98); }
  .publish-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status { margin-top: 14px; padding: 12px 14px; border-radius: 8px; font-size: 14px; display: none; line-height: 1.5; }
  .status.success { background: #e8f5e9; color: #2d6a4f; display: block; }
  .status.error { background: #fdecea; color: #c0392b; display: block; }
  .status.loading { background: #f5f0e8; color: #8a8070; display: block; }
  .hidden { display: none; }
</style>
</head>
<body>
<div class="card">
  <h1>⚡ Daily Publisher</h1>
  <p class="sub">blinkthirty · Paste your Claude content and publish</p>

  <button class="toggle-btn" onclick="toggleConfig()" id="toggle-btn">⚙ Config (set once) ▾</button>
  <div id="config-box" class="config-box hidden">
    <div class="config-title">GitHub Config</div>
    <label>GitHub Token</label>
    <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" oninput="save()" />
    <div class="row">
      <div><label>Owner</label><input type="text" id="gh-owner" placeholder="Agrim98" oninput="save()" /></div>
      <div><label>Repo</label><input type="text" id="gh-repo" placeholder="blinkthirty" oninput="save()" /></div>
    </div>
    <label>File path</label>
    <input type="text" id="gh-file" placeholder="index.html" oninput="save()" />
  </div>

  <hr class="divider">
  <span class="section-label">Posting day</span>
  <div class="day-grid" id="day-grid"></div>

  <hr class="divider">
  <span class="section-label">Post details</span>
  <div class="tag-row">
    <div>
      <label>Category</label>
      <select id="post-tag">
        <option value="story">Story</option>
        <option value="creative">Creative</option>
        <option value="lifestyle">Lifestyle</option>
        <option value="mindset">Mindset</option>
        <option value="people">People</option>
      </select>
    </div>
    <div>
      <label>Title</label>
      <input type="text" id="post-title" placeholder="Your post title" style="margin-bottom:0;" />
    </div>
  </div>
  <label>Your content from Claude</label>
  <textarea id="post-draft" placeholder="Paste your post content from Claude here..."></textarea>

  <button class="publish-btn" onclick="publish()" id="pub-btn">Publish today's post ↗</button>
  <div class="status" id="status"></div>
</div>

<script>
const grid = document.getElementById('day-grid');
let selectedDay = null;
for (let i = 1; i <= 30; i++) {
  const btn = document.createElement('button');
  btn.className = 'day-btn';
  btn.textContent = i;
  btn.onclick = () => {
    document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDay = i;
  };
  grid.appendChild(btn);
}

function toggleConfig() {
  const box = document.getElementById('config-box');
  const btn = document.getElementById('toggle-btn');
  box.classList.toggle('hidden');
  btn.textContent = box.classList.contains('hidden') ? '⚙ Config (set once) ▾' : '⚙ Config (set once) ▴';
}

function save() {
  try {
    localStorage.setItem('bt-cfg', JSON.stringify({
      token: document.getElementById('gh-token').value,
      owner: document.getElementById('gh-owner').value,
      repo: document.getElementById('gh-repo').value,
      file: document.getElementById('gh-file').value,
    }));
  } catch(e) {}
}

function load() {
  try {
    const d = JSON.parse(localStorage.getItem('bt-cfg') || '{}');
    if (d.token) document.getElementById('gh-token').value = d.token;
    if (d.owner) document.getElementById('gh-owner').value = d.owner;
    if (d.repo) document.getElementById('gh-repo').value = d.repo;
    if (d.file) document.getElementById('gh-file').value = d.file;
  } catch(e) {}
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

async function publish() {
  const token = document.getElementById('gh-token').value.trim();
  const owner = document.getElementById('gh-owner').value.trim() || 'Agrim98';
  const repo = document.getElementById('gh-repo').value.trim() || 'blinkthirty';
  const file = document.getElementById('gh-file').value.trim() || 'index.html';
  const tag = document.getElementById('post-tag').value;
  const tagLabel = tag.charAt(0).toUpperCase() + tag.slice(1);
  const title = document.getElementById('post-title').value.trim();
  const draft = document.getElementById('post-draft').value.trim();

  if (!token) { setStatus('Please add your GitHub token in Config first.', 'error'); return; }
  if (!selectedDay) { setStatus('Please select a posting day.', 'error'); return; }
  if (!title) { setStatus('Please enter a title.', 'error'); return; }
  if (!draft) { setStatus('Please paste your content from Claude.', 'error'); return; }

  const btn = document.getElementById('pub-btn');
  btn.disabled = true;
  setStatus('Publishing...', 'loading');

  const newEntry = `  {\n    day: ${selectedDay}, tag: "${tag}", tagLabel: "${tagLabel}",\n    hook: "Day ${selectedDay} / 30",\n    title: ${JSON.stringify(title)},\n    draft: ${JSON.stringify(draft)}\n  }`;

  try {
    const res = await fetch('/.netlify/functions/publish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, owner, repo, file, day: selectedDay, entry: newEntry })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Unknown error');
    setStatus('Day ' + selectedDay + ' published! Your site updates in ~30 seconds.', 'success');
    document.getElementById('post-draft').value = '';
    document.getElementById('post-title').value = '';
  } catch(e) {
    setStatus('Error: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
  }
}

load();
</script>
</body>
</html>
